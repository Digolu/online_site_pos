<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adicionar Fornecedor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: #2e2e2e; --accent: #c8f060; --text: #f0ede8;
    --text-muted: #7a7870; --danger: #ff5f5f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header {
    padding: 20px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 13px; transition: color 0.15s; }
  .back-btn:hover { color: var(--accent); }
  header .sep { color: var(--border); font-size: 20px; }
  header h1 { font-size: 15px; font-weight: 500; color: #b0ada8; }
  .loja-badge { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); background: #1e2a0e; padding: 6px 14px; border-radius: 20px; border: 1px solid #3a5010; }
  main { max-width: 540px; margin: 0 auto; padding: 40px 24px; display: flex; flex-direction: column; gap: 28px; }
  .form-titulo h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .form-titulo p { font-size: 13px; color: var(--text-muted); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .campo { display: flex; flex-direction: column; gap: 6px; }
  .campo.full { grid-column: 1 / -1; }
  label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  input { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  input:focus { border-color: var(--accent); }
  .alerta { padding: 13px 16px; border-radius: 10px; font-size: 13px; }
  .alerta.erro { background: #2a1010; border: 1px solid var(--danger); color: var(--danger); }
  .alerta.sucesso { background: #1a2a08; border: 1px solid var(--accent); color: var(--accent); }
  .btn-submeter { padding: 14px; background: var(--accent); color: #0f0f0f; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
  .btn-submeter:hover { background: #d8ff70; }
</style>
</head>
<body>

<header>
  <a href="/adicionar_produto/" class="back-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Voltar
  </a>
  <span class="sep">›</span>
  <h1>Adicionar Fornecedor</h1>
  <span class="loja-badge">🏪 {{ loja_atual }}</span>
</header>

<main>
  <div class="form-titulo">
    <h2>Novo fornecedor</h2>
    <p>Preenche os dados do fornecedor.</p>
  </div>

  {% if erro %}
  <div class="alerta erro">⚠ {{ erro }}</div>
  {% endif %}
  {% if sucesso %}
  <div class="alerta sucesso">✓ {{ sucesso }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="form-grid">

      <div class="campo full">
        <label>NIF</label>
        <input type="number" name="nif" placeholder="Ex: 501234567" required>
      </div>

      <div class="campo full">
        <label>Nome</label>
        <input type="text" name="nome" placeholder="Ex: Distribuidora Norte, Lda." required>
      </div>

      <div class="campo full">
        <label>Email</label>
        <input type="text" name="email" placeholder="Ex: geral@empresa.pt" required>
      </div>

      <div class="campo">
        <label>Contacto</label>
        <input type="number" name="contacto" placeholder="Ex: 253401200" required>
      </div>

      <div class="campo">
        <label>Morada</label>
        <input type="text" name="morada" placeholder="Ex: Braga" required>
      </div>

    </div>

    <button type="submit" class="btn-submeter">Adicionar fornecedor →</button>
  </form>
</main>

</body>
</html>
