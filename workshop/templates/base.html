{% load static %}
<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block titulo %}Sistema POS{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="{% static 'css/tema.css' %}" />

    <script src="{% static 'js/tema.js' %}"></script>

    {% block extra_head %}{% endblock %}
  </head>

  <body>
    <button type="button" class="tema-toggle" onclick="alternarTema()" title="Alternar tema claro/escuro"
      style="position: fixed; top: 18px; right: 18px; z-index: 1000; display: flex; align-items: center; gap: 8px;">
      <svg id="tema-icone" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <span id="tema-texto">Escuro</span>
    </button>

    {% block content %}{% endblock %}

    {% block extra_scripts %}{% endblock %}
  </body>
</html>
