<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e;
    --accent: #c8f060; --text: #f0ede8; --text-muted: #7a7870;
    --danger: #ff5f5f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px; width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 24px;
  }
  .logo {
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase;
  }
  h1 { font-size: 24px; font-weight: 600; }
  .campo { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  input {
    background: #111; border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  .erro { font-size: 13px; color: var(--danger); }
  .btn {
    padding: 14px; background: var(--accent); color: #0f0f0f;
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { background: #d8ff70; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">Sistema POS</div>
  <h1>Iniciar sessão</h1>
  {% if erro %}
  <div class="erro">{{ erro }}</div>
  {% endif %}
  <form method="POST">
    {% csrf_token %}
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="campo">
        <label>Utilizador</label>
        <input type="text" name="username" autofocus>
      </div>
      <div class="campo">
        <label>Password</label>
        <input type="password" name="password">
      </div>
    </div>
    <button type="submit" class="btn" style="width:100%;margin-top:24px">Entrar</button>
  </form>
</div>
</body>
</html>
