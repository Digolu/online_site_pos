{% extends "base.html" %}

{% block titulo %}Iniciar Sessão · Sistema POS{% endblock %}

{% block extra_head %}
<style>
  /* Centraliza o painel de login na zona de conteúdo principal */
  .login-container {
    min-height: calc(100vh - 80px); /* Ajusta à altura do ecrã descontando possíveis margens */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .box {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    box-shadow: 0 12px 34px rgba(0, 0, 0, 0.15);
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent-dark);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .box h1 {
    font-size: 24px;
    font-weight: 600;
    color: var(--ink);
  }

  .campo {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .box label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .box input {
    background: var(--soft);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--surface-2);
  }

  .erro {
    font-size: 13px;
    color: var(--danger);
    background: var(--danger-bg);
    border: 1px solid var(--danger-border);
    padding: 10px 12px;
    border-radius: 8px;
  }

  .btn-login {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: var(--accent-dark);
    color: var(--surface); /* Alto contraste dinâmico para o texto do botão */
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }

  .btn-login:hover {
    background: var(--accent);
    transform: translateY(-1px);
  }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
  <div class="box">
    <div class="logo">Sistema POS</div>
    <h1>Iniciar sessão</h1>
    
    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}
    
    <form method="POST">
      {% csrf_token %}
      <div style="display:flex; flex-direction:column; gap:16px">
        <div class="campo">
          <label>Utilizador</label>
          <input type="text" name="username" autofocus required>
        </div>
        <div class="campo">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
