<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adicionar Produto</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --surface2: #242424;
        --border: #2e2e2e;
        --accent: #c8f060;
        --text: #f0ede8;
        --text-muted: #7a7870;
        --danger: #ff5f5f;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      header {
        padding: 20px 32px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
        position: sticky;
        top: 0;
        background: var(--bg);
        z-index: 10;
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 13px;
        transition: color 0.15s;
      }
      .back-btn:hover {
        color: var(--accent);
      }
      header .sep {
        color: var(--border);
        font-size: 20px;
      }
      header h1 {
        font-size: 15px;
        font-weight: 500;
        color: #b0ada8;
      }
      .loja-badge {
        margin-left: auto;
        font-family: "DM Mono", monospace;
        font-size: 12px;
        color: var(--accent);
        background: #1e2a0e;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid #3a5010;
      }

      main {
        max-width: 540px;
        margin: 0 auto;
        padding: 40px 24px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .form-titulo h2 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .form-titulo p {
        font-size: 13px;
        color: var(--text-muted);
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .campo {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .campo.full {
        grid-column: 1 / -1;
      }
      label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      input,
      select {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 14px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
        width: 100%;
      }
      input:focus,
      select:focus {
        border-color: var(--accent);
      }
      select option {
        background: var(--surface2);
      }

      .id-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      .id-row input {
        flex: 1;
      }
      .btn-sugerir {
        padding: 11px 14px;
        background: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-muted);
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.15s;
        font-family: "DM Sans", sans-serif;
      }
      .btn-sugerir:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .alerta {
        padding: 13px 16px;
        border-radius: 10px;
        font-size: 13px;
      }
      .alerta.erro {
        background: #2a1010;
        border: 1px solid var(--danger);
        color: var(--danger);
      }
      .alerta.sucesso {
        background: #1a2a08;
        border: 1px solid var(--accent);
        color: var(--accent);
      }

      .btn-submeter {
        padding: 14px;
        background: var(--accent);
        color: #0f0f0f;
        border: none;
        border-radius: 12px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        width: 100%;
      }
      .btn-submeter:hover {
        background: #d8ff70;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/" class="back-btn">
        <svg
          width="14"
          height="14"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path d="M19 12H5M12 5l-7 7 7 7" />
        </svg>
        Voltar
      </a>
      <span class="sep">›</span>
      <h1>Adicionar Produto</h1>
      <span class="loja-badge">🏪 {{ loja_atual }}</span>
    </header>

    <main>
      <div class="form-titulo">
        <h2>Novo produto</h2>
        <p>
          Este produto ficará associado à loja
          <strong>{{ loja_atual }}</strong>.
        </p>
      </div>

      {% if erro %}
      <div class="alerta erro">⚠ {{ erro }}</div>
      {% endif %} {% if sucesso %}
      <div class="alerta sucesso">✓ {{ sucesso }}</div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="form-grid">
          <div class="campo full">
            <label>ID do produto</label>
            <div class="id-row">
              <input
                type="number"
                name="id"
                id="campo-id"
                value="{{ proximo_id }}"
                required
              />
              <button
                type="button"
                class="btn-sugerir"
                onclick="usarSugerido()"
              >
                Usar sugerido ({{ proximo_id }})
              </button>
            </div>
          </div>

          <div class="campo full">
            <label>Nome</label>
            <input
              type="text"
              name="nome"
              placeholder="Ex: Coca-Cola 33cl"
              required
            />
          </div>

          <div class="campo">
            <label>Preço (€)</label>
            <input
              type="number"
              name="preco"
              min="0"
              placeholder="0"
              required
            />
          </div>

          <div class="campo">
            <label>Stock (qtd)</label>
            <input type="number" name="qtd" min="0" placeholder="0" required />
          </div>

          <div class="campo">
            <label>Desconto (%)</label>
            <input type="number" name="desconto" min="0" max="100" value="0" />
          </div>

          <div class="campo">
            <label>IVA (%)</label>
            <select name="iva">
              <option value="6">6% — Taxa reduzida</option>
              <option value="13">13% — Taxa intermédia</option>
              <option value="23" selected>23% — Taxa normal</option>
            </select>
          </div>

          <div class="campo full">
            <label>Secção</label>
            <select name="seccao" required>
              {% for s in seccoes %}
              <option value="{{ s.nome }}">{{ s.nome }}</option>
              {% empty %}
              <option disabled>Sem secções — cria uma abaixo</option>
              {% endfor %}
            </select>
            <a
              href="/adicionar_seccao/"
              style="
                margin-top: 8px;
                font-size: 12px;
                color: var(--accent);
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 4px;
              "
              >+ Criar nova secção</a
            >
          </div>

          <div class="campo full" style="margin-top: 8px">
            <label>Fornecedor</label>
            <select
              name="fornecedor"
              id="sel-forn"
              onchange="mostrarInfoFornecedor(this)"
            >
              <option value="">— Sem fornecedor (opcional) —</option>
              {% for f in fornecedores %}
              <option
                value="{{ f.nif }}"
                data-email="{{ f.email }}"
                data-tel="{{ f.contacto }}"
                data-morada="{{ f.morada }}"
              >
                {{ f.nif }} — {{ f.nome }}
              </option>
              {% endfor %}
            </select>

            <div
              id="forn-info"
              style="
                display: none;
                margin-top: 10px;
                padding: 10px 14px;
                background: #1e2a0e;
                border: 1px solid #3a5010;
                border-radius: 10px;
                font-size: 12px;
                color: var(--accent);
                gap: 16px;
                flex-wrap: wrap;
              "
            >
              <div>
                <span style="color: var(--text-muted)">Email </span
                ><span id="forn-email"></span>
              </div>
              <div>
                <span style="color: var(--text-muted)">Contacto </span
                ><span id="forn-tel"></span>
              </div>
              <div>
                <span style="color: var(--text-muted)">Morada </span
                ><span id="forn-morada"></span>
              </div>
            </div>

            <a
              href="/adicionar_fornecedor/"
              style="
                margin-top: 8px;
                font-size: 12px;
                color: var(--accent);
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 4px;
              "
              >+ Adicionar novo fornecedor</a
            >
          </div>
        </div>

        <button type="submit" class="btn-submeter" style="margin-top: 24px">
          Adicionar produto →
        </button>
      </form>
    </main>
    <script>
      const proximoId = {{ proximo_id }};

      function usarSugerido() {
        document.getElementById('campo-id').value = proximoId;
      }

      function mostrarInfoFornecedor(sel) {
        const info = document.getElementById('forn-info');
        const opt = sel.options[sel.selectedIndex];
        if (!sel.value) { info.style.display = 'none'; return; }
        document.getElementById('forn-email').textContent = opt.dataset.email;
        document.getElementById('forn-tel').textContent = opt.dataset.tel;
        document.getElementById('forn-morada').textContent = opt.dataset.morada;
        info.style.display = 'flex';
      }
    </script>
  </body>
</html>
