<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limpar Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e;
    --accent: #c8f060; --text: #f0ede8; --text-muted: #7a7870;
    --danger: #ff5f5f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .box {
    background: var(--surface); border: 1px solid var(--danger);
    border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .aviso {
    display: flex; align-items: center; gap: 10px;
  }
  .aviso-icon {
    font-size: 28px;
  }
  h1 { font-size: 22px; font-weight: 600; color: var(--danger); }
  p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .campo { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  input {
    background: #111; border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--danger); }
  .erro { font-size: 13px; color: var(--danger); }
  .btns { display: flex; gap: 10px; }
  .btn-cancelar {
    flex: 1; padding: 13px; background: none; color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
    text-align: center; text-decoration: none; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-cancelar:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-apagar {
    flex: 1; padding: 13px; background: var(--danger); color: #fff;
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-apagar:hover { background: #ff3333; }
</style>
</head>
<body>
<div class="box">
  <div class="aviso">
    <span class="aviso-icon">⚠️</span>
    <h1>Limpar histórico</h1>
  </div>

  <p>Esta ação vai apagar <strong>todas as vendas</strong> permanentemente. Confirma a tua password para continuar.</p>

  {% if erro %}
  <div class="erro">{{ erro }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="campo" style="margin-bottom: 20px;">
      <label>Password</label>
      <input type="password" name="password" autofocus placeholder="••••••••">
    </div>
    <div class="btns">
      <a href="/lista_vendas/" class="btn-cancelar">Cancelar</a>
      <button type="submit" class="btn-apagar">Apagar tudo</button>
    </div>
  </form>
</div>
</body>
</html>
