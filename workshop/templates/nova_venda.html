<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Venda</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent-dim: #8aaa2a;
    --text: #f0ede8;
    --text-muted: #7a7870;
    --text-soft: #b0ada8;
    --danger: #ff5f5f;
    --tag-bg: #222;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: auto 1fr;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  header .sep { color: var(--border); font-size: 20px; }

  header h1 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-soft);
  }

  header .recibo-badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ── LEFT: CATÁLOGO ── */
  .catalogo {
    padding: 28px 32px;
    overflow-y: auto;
    max-height: calc(100vh - 65px);
  }

  .catalogo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .catalogo-header h2 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    flex: 1;
    max-width: 280px;
    transition: border-color 0.2s;
  }

  .search-bar:focus-within { border-color: var(--accent); }

  .search-bar svg { color: var(--text-muted); flex-shrink: 0; }

  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    width: 100%;
  }

  .search-bar input::placeholder { color: var(--text-muted); }

  /* filtros de secção */
  .filtros {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .filtro-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .filtro-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filtro-btn.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 600; }

  /* grelha de produtos */
  .produtos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .produto-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }

  .produto-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.18s;
    border-radius: inherit;
  }

  .produto-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .produto-card:hover::before { opacity: 0.04; }

  .produto-card.sem-stock {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .produto-card.sem-stock:hover { transform: none; border-color: var(--border); }
  .produto-card.sem-stock:hover::before { opacity: 0; }

  .produto-card.adicionado { border-color: var(--accent); }
  .produto-card.adicionado::before { opacity: 0.06; }

  .tag-seccao {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--tag-bg);
    color: var(--text-muted);
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }

  .produto-nome {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .produto-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }

  .produto-preco {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--accent);
  }

  .produto-stock {
    font-size: 11px;
    color: var(--text-muted);
  }

  .produto-stock.baixo { color: #f0a040; }
  .produto-stock.esgotado { color: var(--danger); }

  .add-indicator {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    color: #0f0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s;
  }

  .produto-card.adicionado .add-indicator {
    opacity: 1;
    transform: scale(1);
  }

  .produto-card.sem-stock .add-indicator { display: none; }

  /* ── RIGHT: CARRINHO ── */
  .carrinho {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 65px);
    position: sticky;
    top: 65px;
  }

  .carrinho-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .carrinho-header h2 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }

  .carrinho-count {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .carrinho-count span {
    color: var(--accent);
    font-weight: 500;
  }

  /* lista de itens */
  .carrinho-itens {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .carrinho-vazio {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-muted);
    padding: 40px;
    text-align: center;
  }

  .carrinho-vazio svg { opacity: 0.3; }
  .carrinho-vazio p { font-size: 13px; line-height: 1.6; }

  .item-venda {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .item-nome {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .item-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .qty-controls {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .qty-btn {
    width: 28px;
    height: 28px;
    background: none;
    border: none;
    color: var(--text-soft);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }

  .qty-btn:hover { background: var(--border); color: var(--text); }

  .qty-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    min-width: 28px;
    text-align: center;
    padding: 0 4px;
  }

  .item-subtotal {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  .item-remover {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
  }

  .item-remover:hover { color: var(--danger); background: rgba(255,95,95,0.1); }

  /* footer do carrinho */
  .carrinho-footer {
    border-top: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .totais {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .totais-linha {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-muted);
  }

  .totais-linha.total {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    padding-top: 8px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .totais-linha .val {
    font-family: 'DM Mono', monospace;
    color: var(--text-soft);
  }

  .totais-linha.total .val { color: var(--accent); }

  .btn-confirmar {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.02em;
  }

  .btn-confirmar:hover { background: #d8ff70; transform: translateY(-1px); }
  .btn-confirmar:active { transform: translateY(0); }
  .btn-confirmar:disabled {
    background: var(--surface2);
    color: var(--text-muted);
    cursor: not-allowed;
    transform: none;
  }

  .btn-limpar {
    width: 100%;
    padding: 10px;
    background: none;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-limpar:hover { color: var(--danger); border-color: var(--danger); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── MODAL CONFIRMAÇÃO ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 50;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px;
    max-width: 400px;
    width: 90%;
    animation: modalIn 0.25s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h3 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .modal-recibo {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    color: var(--accent);
    text-align: center;
    padding: 20px;
    background: var(--surface2);
    border-radius: 12px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    letter-spacing: 0.1em;
  }

  .modal-itens {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .modal-item {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-soft);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .modal-total {
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 600;
    padding-top: 4px;
  }

  .modal-total .val {
    font-family: 'DM Mono', monospace;
    color: var(--accent);
  }

  .modal-btns {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .modal-btns button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancelar-modal {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .btn-cancelar-modal:hover { border-color: var(--text-muted); color: var(--text); }

  .btn-guardar-modal {
    background: var(--accent);
    border: none;
    color: #0f0f0f;
    font-weight: 600;
  }

  .btn-guardar-modal:hover { background: #d8ff70; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .nenhum {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px;
  transition: color 0.15s;
}

.back-btn:hover { color: var(--accent); }

</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a href="/" class="back-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Voltar
  </a>
  <span class="sep">›</span>
  <span class="logo">Loja</span>
  <span class="sep">›</span>
  <h1>Nova Venda</h1>
  <span class="recibo-badge" id="recibo-display">Recibo #—</span>
</header>

<!-- CATÁLOGO -->
<main class="catalogo">
  <div class="catalogo-header">
    <h2>Produtos</h2>
    <div class="search-bar">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Pesquisar produto…" oninput="filtrar()">
    </div>
  </div>

  <div class="filtros" id="filtros">
    <button class="filtro-btn active" onclick="filtrarSeccao('todos', this)">Todos</button>
  </div>

  <div class="produtos-grid" id="grid"></div>
</main>

<!-- CARRINHO -->
<aside class="carrinho">
  <div class="carrinho-header">
    <h2>Carrinho</h2>
    <div class="carrinho-count">
      <span id="count">0</span> produto(s) adicionado(s)
    </div>
  </div>

  <div class="carrinho-itens" id="carrinho-itens">
    <div class="carrinho-vazio" id="carrinho-vazio">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <p>Nenhum produto<br>adicionado ainda.</p>
    </div>
  </div>

  <div class="carrinho-footer">
    <div class="totais">
      <div class="totais-linha">
        <span>Subtotal</span>
        <span class="val" id="subtotal">0.00 €</span>
      </div>
      <div class="totais-linha">
        <span>IVA (méd.)</span>
        <span class="val" id="iva-total">0.00 €</span>
      </div>
      <div class="totais-linha total">
        <span>Total</span>
        <span class="val" id="total">0.00 €</span>
      </div>
    </div>
    <button class="btn-confirmar" id="btn-confirmar" onclick="abrirModal()" disabled>
      Confirmar Venda
    </button>
    <button class="btn-limpar" onclick="limparCarrinho()">Limpar carrinho</button>
  </div>
</aside>


<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Confirmar venda</h3>
    <p>Revê os detalhes antes de guardar.</p>
    <div class="modal-recibo" id="modal-recibo"></div>
    <div class="modal-itens" id="modal-itens"></div>
    <div class="modal-total">
      <span>Total</span>
      <span class="val" id="modal-total-val"></span>
    </div>

    <!-- PAGAMENTO -->
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <label style="font-size:13px;color:var(--text-muted)">Valor recebido (€)</label>
        <input
          type="number"
          id="valor-recebido"
          min="0"
          step="0.01"
          placeholder="0.00"
          oninput="calcularTroco()"
          autofocus
          style="
            background:#111;border:1px solid var(--border);border-radius:8px;
            padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;
            font-size:14px;outline:none;width:130px;text-align:right;
          "
        >
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--border)">
        <span style="font-size:15px;font-weight:600">Troco</span>
        <span id="troco-val" style="font-family:'DM Mono',monospace;font-size:18px;color:var(--accent);font-weight:600">—</span>
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn-cancelar-modal" onclick="fecharModal()">Cancelar</button>
      <button class="btn-guardar-modal" id="btn-guardar" onclick="guardarVenda()" disabled>Guardar venda</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DADOS ─────────────────────────────────────────────────────
// Em Django, substituirias este array pelo template tag:
// const produtos = {{ produtos|safe }};
const produtos = {{ produtos_json|safe }};

// ── ESTADO ────────────────────────────────────────────────────
let carrinho = {};
let seccaoAtiva = 'todos';
let recibo = {{ proximo_recibo }};
document.getElementById('recibo-display').textContent = `Recibo #${recibo}`;

// ── INIT ──────────────────────────────────────────────────────
function init() {
  // secções únicas
  const seccoes = [...new Set(produtos.map(p => p.seccao))];
  const filtros = document.getElementById('filtros');
  seccoes.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filtro-btn';
    btn.textContent = s;
    btn.onclick = () => filtrarSeccao(s, btn);
    filtros.appendChild(btn);
  });
  renderGrid();
}

// ── RENDER GRID ───────────────────────────────────────────────
function renderGrid() {
  const query = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const filtrados = produtos.filter(p => {
    const matchSeccao = seccaoAtiva === 'todos' || p.seccao === seccaoAtiva;
    const matchSearch = p.nome.toLowerCase().includes(query);
    return matchSeccao && matchSearch;
  });

  if (filtrados.length === 0) {
    grid.innerHTML = '<p class="nenhum">Nenhum produto encontrado.</p>';
    return;
  }

  filtrados.forEach(p => {
    const semStock = p.qtd === 0;
    const adicionado = carrinho[p.id] ? true : false;
    const precoFinal = p.desconto > 0
      ? (p.preco * (1 - p.desconto / 100)).toFixed(2)
      : p.preco.toFixed(2);

    let stockLabel = `${p.qtd} em stock`;
    let stockClass = '';
    if (p.qtd === 0) { stockLabel = 'Esgotado'; stockClass = 'esgotado'; }
    else if (p.qtd <= 5) { stockClass = 'baixo'; stockLabel = `Só ${p.qtd} restantes!`; }

    const card = document.createElement('div');
    card.className = `produto-card${semStock ? ' sem-stock' : ''}${adicionado ? ' adicionado' : ''}`;
    card.id = `card-${p.id}`;
    card.onclick = () => { if (!semStock) adicionarAoCarrinho(p); };

    card.innerHTML = `
      <div class="add-indicator">✓</div>
      <div class="tag-seccao">${p.seccao}</div>
      <div class="produto-nome">${p.nome}</div>
      ${p.fornecedor ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">🏭 ${p.fornecedor}</div>` : ''}
      ${p.desconto > 0 ? `<div style="font-size:11px;color:var(--text-muted);text-decoration:line-through;margin-top:2px">${p.preco.toFixed(2)}€</div>` : ''}
      <div class="produto-meta">
        <span class="produto-preco">${precoFinal}€${p.desconto > 0 ? ` <span style="font-size:10px;color:var(--accent-dim);font-family:'DM Sans'">-${p.desconto}%</span>` : ''}</span>
        <span class="produto-stock ${stockClass}">${stockLabel}</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── FILTROS ───────────────────────────────────────────────────
function filtrarSeccao(seccao, btn) {
  seccaoAtiva = seccao;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filtrar() { renderGrid(); }

// ── CARRINHO ──────────────────────────────────────────────────
function adicionarAoCarrinho(produto) {
  const precoFinal = produto.desconto > 0
    ? parseFloat((produto.preco * (1 - produto.desconto / 100)).toFixed(2))
    : produto.preco;

  if (carrinho[produto.id]) {
    if (carrinho[produto.id].qty >= produto.qtd) {
      mostrarToast('Stock insuficiente!'); return;
    }
    carrinho[produto.id].qty++;
  } else {
    carrinho[produto.id] = { produto, qty: 1, preco: precoFinal };
    document.getElementById(`card-${produto.id}`)?.classList.add('adicionado');
  }

  mostrarToast(`${produto.nome} adicionado`);
  renderCarrinho();
}

function removerItem(id) {
  delete carrinho[id];
  document.getElementById(`card-${id}`)?.classList.remove('adicionado');
  renderCarrinho();
}

function alterarQty(id, delta) {
  if (!carrinho[id]) return;
  const novaQty = carrinho[id].qty + delta;
  const maxStock = carrinho[id].produto.qtd;

  if (novaQty <= 0) { removerItem(id); return; }
  if (novaQty > maxStock) { mostrarToast('Stock insuficiente!'); return; }

  carrinho[id].qty = novaQty;
  renderCarrinho();
}

function limparCarrinho() {
  Object.keys(carrinho).forEach(id => {
    document.getElementById(`card-${id}`)?.classList.remove('adicionado');
  });
  carrinho = {};
  renderCarrinho();
}

function renderCarrinho() {
  const container = document.getElementById('carrinho-itens');
  const vazio = document.getElementById('carrinho-vazio');
  const itens = Object.values(carrinho);

  document.getElementById('count').textContent = itens.length;

  if (itens.length === 0) {
    container.innerHTML = '';
    container.appendChild(vazio);
    document.getElementById('btn-confirmar').disabled = true;
    document.getElementById('subtotal').textContent = '0.00 €';
    document.getElementById('iva-total').textContent = '0.00 €';
    document.getElementById('total').textContent = '0.00 €';
    return;
  }

  container.innerHTML = '';
  let subtotal = 0;
  let ivaTotal = 0;

  itens.forEach(({ produto, qty, preco }) => {
    const sub = preco * qty;
    const iva = sub * (produto.iva / 100);
    subtotal += sub;
    ivaTotal += iva;

    const div = document.createElement('div');
    div.className = 'item-venda';
    div.innerHTML = `
      <div class="item-nome">${produto.nome}</div>
      <div class="item-controls">
        <div class="qty-controls">
          <button class="qty-btn" onclick="alterarQty(${produto.id}, -1)">−</button>
          <span class="qty-value">${qty}</span>
          <button class="qty-btn" onclick="alterarQty(${produto.id}, +1)">+</button>
        </div>
        <span class="item-subtotal">${sub.toFixed(2)} €</span>
        <button class="item-remover" onclick="removerItem(${produto.id})" title="Remover">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
          </svg>
        </button>
      </div>
    `;
    container.appendChild(div);
  });

  const total = subtotal + ivaTotal;
  document.getElementById('subtotal').textContent = subtotal.toFixed(2) + ' €';
  document.getElementById('iva-total').textContent = ivaTotal.toFixed(2) + ' €';
  document.getElementById('total').textContent = total.toFixed(2) + ' €';
  document.getElementById('btn-confirmar').disabled = false;
}

// ── MODAL ─────────────────────────────────────────────────────
function abrirModal() {
  const itens = Object.values(carrinho);
  let subtotal = 0, ivaTotal = 0;
  const modalItens = document.getElementById('modal-itens');
  modalItens.innerHTML = '';
  itens.forEach(({ produto, qty, preco }) => {
    const sub = preco * qty;
    const iva = sub * (produto.iva / 100);
    subtotal += sub;
    ivaTotal += iva;
    const div = document.createElement('div');
    div.className = 'modal-item';
    div.innerHTML = `
      <span>${produto.nome} × ${qty}</span>
      <span style="font-family:'DM Mono',monospace">${sub.toFixed(2)} €</span>
    `;
    modalItens.appendChild(div);
  });

  totalAtual = parseFloat((subtotal + ivaTotal).toFixed(2));
  document.getElementById('modal-recibo').textContent = `#${recibo}`;
  document.getElementById('modal-total-val').textContent = totalAtual.toFixed(2) + ' €';
  document.getElementById('valor-recebido').value = '';
  document.getElementById('troco-val').textContent = '—';
  document.getElementById('btn-guardar').disabled = true;
  document.getElementById('overlay').classList.add('show');

  setTimeout(() => {
    document.getElementById('valor-recebido').focus();
  }, 50);
}

function fecharModal() {
  document.getElementById('overlay').classList.remove('show');
}

function guardarVenda() {
    const itens = Object.values(carrinho).map(({ produto, qty, preco }) => ({
        id: produto.id,
        qty: qty,
        preco: preco
    }));

    fetch('/nova_venda/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ recibo: recibo, itens: itens })
    })
    .then(res => res.json())
    .then(data => {
        if (data.sucesso) {
            fecharModal();
            mostrarToast(`✓ Venda #${recibo} guardada!`);
            setTimeout(() => {
                location.reload();// ← reload busca automaticamente o próximo recibo à BD
            }, 1000);
        } else {
            mostrarToast('Erro: ' + data.erro);
        }
    })
    .catch(() => mostrarToast('Erro ao guardar venda.'));
}

// função auxiliar para obter o cookie CSRF do Django
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        document.cookie.split(';').forEach(cookie => {
            const c = cookie.trim();
            if (c.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(c.substring(name.length + 1));
            }
        });
    }
    return cookieValue;
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// fechar modal ao clicar fora
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) fecharModal();
});

let totalAtual = 0;

function calcularTroco() {
  const recebido = parseFloat(document.getElementById('valor-recebido').value) || 0;
  const troco = recebido - totalAtual;
  const trocoEl = document.getElementById('troco-val');
  const btnGuardar = document.getElementById('btn-guardar');

  if (recebido >= totalAtual) {
    trocoEl.textContent = troco.toFixed(2) + ' €';
    trocoEl.style.color = 'var(--accent)';
    btnGuardar.disabled = false;
  } else {
    trocoEl.textContent = recebido > 0 ? 'Valor insuficiente' : '—';
    trocoEl.style.color = 'var(--danger)';
    btnGuardar.disabled = true;
  }
}

init();
</script>
